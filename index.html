<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan's 2FA Test Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .test-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; max-width: 400px; }
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px auto; width: 200px; }
        input { width: 100%; padding: 15px; font-size: 24px; text-align: center; letter-spacing: 10px; background: #000; border: 1px solid var(--main); color: var(--main); border-radius: 10px; margin: 20px 0; outline: none; }
        .result { font-weight: bold; font-size: 20px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: rgba(0, 255, 136, 0.2); color: var(--main); display: block; }
        .fail { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; display: block; }
        code { color: #888; background: #000; padding: 5px; }
    </style>
</head>
<body>

    <h1>2FA Test Lab</h1>
    <p>Test your app's sync and logic here.</p>

    <div class="test-box">
        <h3>Step 1: Scan this QR</h3>
        <div id="qrcode"></div>
        <p style="font-size: 12px; color: #888;">Secret: <code id="secret-disp"></code></p>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <h3>Step 2: Verify Code</h3>
        <p>Type the 6-digit code from your app:</p>
        <input type="text" id="verify-input" maxlength="6" placeholder="000000">
        <div id="result-msg" class="result"></div>
    </div>

<script>
    // Generate a random Secret Key for this test session
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    let randomSecret = "";
    for(let i=0; i<16; i++) randomSecret += charset.charAt(Math.floor(Math.random() * charset.length));
    
    document.getElementById('secret-disp').innerText = randomSecret;

    // Create the QR Code (OTPAuth Format)
    const uri = `otpauth://totp/JordanTest:User?secret=${randomSecret}&issuer=JordanTest`;
    new QRCode(document.getElementById("qrcode"), { text: uri, width: 200, height: 200 });

    // Setup TOTP engine to check user input
    const totp = new OTPAuth.TOTP({
        secret: randomSecret,
        digits: 6,
        period: 30
    });

    const input = document.getElementById('verify-input');
    const msg = document.getElementById('result-msg');

    input.addEventListener('input', () => {
        const userCode = input.value;
        
        if(userCode.length === 6) {
            // Check if user code matches the calculated code
            const isValid = totp.validate({ token: userCode, window: 1 });

            if(isValid !== null) {
                msg.innerText = "✅ SUCCESS: Code is Correct!";
                msg.className = "result success";
            } else {
                msg.innerText = "❌ FAIL: Code is Incorrect!";
                msg.className = "result fail";
            }
        } else {
            msg.className = "result";
        }
    });
</script>
</body>
</html>
